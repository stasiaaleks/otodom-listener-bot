services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-otodom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-otodom}
      POSTGRES_DB: ${POSTGRES_DB:-otodom}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bound to localhost only — not exposed on the VM's public interface.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-otodom} -d ${POSTGRES_DB:-otodom}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Overrides DATABASE_URL from .env so the app reaches the db service by name.
      DATABASE_URL: postgresql://${POSTGRES_USER:-otodom}:${POSTGRES_PASSWORD:-otodom}@db:5432/${POSTGRES_DB:-otodom}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  pgdata:
